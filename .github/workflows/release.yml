name: Build & Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach artifacts to (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & package Windows
        run: |
          bun run build:exe:win
          cd apps/webui/dist/exe
          zip -r ../../../../agentchan-windows-x64.zip .

      - name: Build & package Linux
        run: |
          bun run build:exe:linux
          cd apps/webui/dist/exe
          tar czf ../../../../agentchan-linux-x64.tar.gz .

      - name: Build & package macOS
        run: |
          bun run build:exe:mac
          cd apps/webui/dist/exe
          tar czf ../../../../agentchan-darwin-arm64.tar.gz .

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.inputs.tag }}" \
            agentchan-windows-x64.zip \
            agentchan-linux-x64.tar.gz \
            agentchan-darwin-arm64.tar.gz \
            --clobber
