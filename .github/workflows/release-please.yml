name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & package Windows
        run: |
          bun run build:exe:win
          cd apps/webui/dist/exe
          zip -r ../../../../agentchan-windows-x64.zip .

      - name: Build & package Linux
        run: |
          bun run build:exe:linux
          cd apps/webui/dist/exe
          tar czf ../../../../agentchan-linux-x64.tar.gz .

      - name: Build & package macOS
        run: |
          bun run build:exe:mac
          cd apps/webui/dist/exe
          tar czf ../../../../agentchan-darwin-arm64.tar.gz .

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            agentchan-windows-x64.zip \
            agentchan-linux-x64.tar.gz \
            agentchan-darwin-arm64.tar.gz \
            --clobber
