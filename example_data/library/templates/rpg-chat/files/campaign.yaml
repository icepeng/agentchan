# === Campaign — 숨김 파일 (LLM 전용) ===
# 씬·대사·OOC에 직접 노출 금지. read 도구로만 참조.
# act-transition / ending-check 스크립트가 조건식을 평가한다.

campaign_id: salren_harbor
title: "저무는 항구"
theme: "잃어버린 것을 지키려는 사람들. 용서가 가능한 범죄가 있는가."

# === 현재 상태 ===
act: 1
current_scene: act1_arrival
elapsed_days: 0
flags: []                       # 게이트 조건에서 쓰이는 플래그 누적. 예: [culprit_exposed, riwu_personal_quest_complete]
choices: {}                     # 플레이어 선택 플래그. 예: { spare_kaelen: true }

# === 3막 구조 ===
acts:
  "1":
    title: "도착"
    premise: "플레이어가 항구에 도착. 실종 사건의 첫 단서."
    key_beats:
      - arrive_dock             # 부두 도착, 리우 조우
      - missing_child_rumor     # 고아원에서 비아가 실종 아동 언급
      - first_clue              # 뒷골목에서 피 묻은 목걸이 발견
    critical_plants:            # 이 막에서 심어야 하는 복선
      - ledger_fragment         # 양조장 장부 단편 — Act 2에서 전체 판독
      - coded_whistle           # 수도승 셀렌이 노래로 흘리는 암호
    budget_scenes: 5            # 권장 씬 수

  "2":
    title: "휘말림"
    premise: "세 세력의 연루가 수면 위. 리우의 과거가 드러남."
    key_beats:
      - faction_reveal          # 암시장·길드·귀족 구도 노출
      - riwu_past_surfaces      # 리우 개인 퀘스트 활성화
      - witness_appears         # 양조장 노파가 목격담 흘림
    critical_plants:
      - dasren_debt             # Lord Dasren의 빚 증서
      - smugglers_route         # 밀수 경로 지도
    budget_scenes: 7

  "3":
    title: "심판"
    premise: "범인 노출, 플레이어의 선택."
    key_beats:
      - confrontation           # culprit 직접 대면
      - choice_point            # 처벌/관용/흡수 선택
      - aftermath               # 엔딩 수렴
    budget_scenes: 4

# === 막 전환 게이트 ===
# act-transition 스크립트가 이 조건식을 파싱해 다음 막으로 열릴 수 있는지 판단.
act_gates:
  to_act2:
    condition: "clues_found>=3 AND trust:riwu>=+1"
    required_beats: [arrive_dock, missing_child_rumor, first_clue]
    narrative_cue: "첫 단서들이 그림의 윤곽을 그리고, 리우가 협력을 약속한다."
  to_act3:
    condition: "flag:culprit_suspected AND (evidence:ledger OR trust:marshal_teren>=+3)"
    required_beats: [faction_reveal, riwu_past_surfaces]
    narrative_cue: "범인의 얼굴이 보인다. 증거든 증언이든 결정적 열쇠를 손에 쥐었다."

# === 진상 ===
# 이 부분이 캠페인 서사의 핵심 뼈대. LLM이 매 씬 참조해야 한다.
truth:
  culprit_primary: kaelen                   # 주범: 암시장 두목
  culprit_secondary: lord_dasren            # 방조자: 빚으로 저택 지하 제공
  enabler: alana                            # 침묵 공범: 세금 회피로 눈감음
  innocent_suspects: [via, brother_selen]   # 의심받으나 결백
  method: "고아원 아동을 납치해 항구 외부 선박으로 밀반출. 다스렌 저택 지하가 임시 은닉소."
  motivation_surface: "금전 — 단순 인신매매 조직"
  motivation_true: |
    카엘렌은 20년 전 몰락한 가문의 후예. 고아로 거리에 나앉은 어린 시절 다스렌 가문의
    선대에게 쫓겨난 기억이 있다. 현재의 밀수는 금전이 아니라 다스렌 가문의 몰락을 가속화하는
    장기 복수. 아이들에 대한 가책은 자기증오로 눌러놓은 상태.
  alibi_weaknesses:
    kaelen: "실종 날 밤 포세계 골목에 부재. 양조장 이동 경로."
    lord_dasren: "저택 지하 사용 승인 문서에 서명 (ledger 단편에 일부 노출)"
    alana: "세금 장부 불일치 (evidence: ledger 전체 판독 시 발견)"

# === 9 엔딩 ===
# 조건식 문법:
#   trust:<npc_id>>=<N>     — 해당 NPC 신뢰 N 이상 (stats.yaml 또는 party.yaml 참조)
#   flag:<name>              — campaign.flags 배열에 존재
#   evidence:<slug>          — inventory.yaml evidence 배열에 존재
#   choice:<slug>=<bool>     — campaign.choices에 저장된 플레이어 선택
#   clues_found>=<N>         — inventory.yaml evidence 개수
# AND / OR / NOT 연결. ending-check 스크립트가 파서.
#
# 분류: 주축(primary_axis) 3개 × 결정 분기(variant) 3개 = 9 엔딩
#   primary_axis: culprit_handling | faction_alignment | personal_cost
endings:
  justice_sworn:
    title: "정의의 칼날"
    primary_axis: culprit_handling
    summary: "마샬 테렌의 손에 카엘렌을 넘긴다. 항구는 피로 씻긴다."
    act3_gate: "flag:culprit_exposed AND trust:marshal_teren>=+3 AND choice:hand_over_culprit=true"
    tone: "명료하지만 차가운 결말. 리우는 말을 아끼고, 항구는 덜 살아 있다."

  mercy_bought:
    title: "자비의 값"
    primary_axis: culprit_handling
    summary: "카엘렌을 살려두는 대가로 조직 해체·아이들 복귀를 맹세받는다."
    act3_gate: "flag:culprit_exposed AND choice:spare_kaelen=true AND trust:via>=+2"
    tone: "이상은 지켰지만 뿌리는 남았다. 다음 세대의 과제."

  heir_of_shadows:
    title: "암흑의 계승"
    primary_axis: culprit_handling
    summary: "카엘렌을 제거하고 그의 자리를 차지한다. 포세계의 새 왕."
    act3_gate: "trust:riwu<=-2 AND flag:culprit_exposed AND choice:take_position=true"
    tone: "가장 어두운 엔딩. 플레이어는 옛 원수와 같은 얼굴이 되었다."

  old_glory_restored:
    title: "옛 영광의 재건"
    primary_axis: faction_alignment
    summary: "다스렌 경의 복권을 돕고, 귀족의 시대를 재건한다."
    act3_gate: "trust:lord_dasren>=+3 AND evidence:ledger AND choice:restore_noble=true"
    tone: "황혼에서 불러내는 빛. 아름답지만 시대에 맞지 않는."

  master_of_trade:
    title: "무역의 주인"
    primary_axis: faction_alignment
    summary: "알라나의 손을 들어 황동 길드의 독점을 공고히 한다."
    act3_gate: "trust:alana>=+3 AND choice:back_guild=true AND flag:culprit_exposed"
    tone: "실용의 승리. 이상은 뒷방에 걸어 놓는다."

  root_and_branch:
    title: "뿌리째 뽑기"
    primary_axis: faction_alignment
    summary: "세 권력을 모두 무너뜨리고, 항구를 주민에게 되돌린다."
    act3_gate: "trust:kaelen<=-2 AND trust:alana<=-2 AND trust:lord_dasren<=-2 AND flag:culprit_exposed"
    tone: "불꽃 같은 혁명. 질서는 아직 오지 않았다."

  riwu_redeemed:
    title: "리우의 구원"
    primary_axis: personal_cost
    summary: "리우가 과거를 극복하고 항구의 새 수호자가 된다."
    act3_gate: "trust:riwu>=+5 AND flag:riwu_personal_quest_complete AND choice:stay_with_riwu=true"
    tone: "가장 따뜻한 엔딩. 둘이서 붙든 작은 불빛."

  riwus_wake:
    title: "리우의 추도"
    primary_axis: personal_cost
    summary: "리우가 죽거나 떠나고, 플레이어는 그 무게를 안고 선다."
    act3_gate: "flag:riwu_broken OR trust:riwu<=-3 OR flag:riwu_killed"
    tone: "비극. 배신이든 죽음이든, 동료가 없는 끝."

  the_nameless_departs:
    title: "이름 없는 자의 퇴장"
    primary_axis: personal_cost
    summary: "플레이어는 결판을 남에게 맡기고 조용히 항구를 떠난다."
    act3_gate: "choice:leave_city=true AND NOT flag:culprit_exposed"
    tone: "침묵의 엔딩. 판단은 뒷사람 몫."

# === 연출 노트 (에이전트 전용) ===
director_notes: |
  - Act 1은 인물 소개와 분위기. 범인은 아직 그림자. 리우와의 신뢰를 유기적으로 쌓기.
  - Act 2에서 리우의 과거가 드러날 때 플레이어의 반응(도움/무시/배신)이 개인 퀘스트 경로 결정 트리거.
  - Act 3의 "카엘렌이 범인"은 고정. 그를 어떻게 대하는가가 9엔딩 분기의 주축.
  - 실종 아동들은 한 명 한 명 이름이 있다. Via의 고아원 명부(scene에서 자연스럽게 공개)에 등장.
  - 다스렌 경은 단순 악역이 아니다. 선한 의도와 치명적 약점(아들 사망·빚·자존심)을 모두 가진 회색 인물.
  - 알라나는 "정의의 대척점"이 아니라 "실용의 대척점". 그녀의 결정은 항구의 이익과 일치할 때도 많다.
  - 세 NPC(카엘렌/다스렌/알라나)는 서로를 경계하면서도 얽힌 관계. 플레이어가 한 명과 가까워지면 다른 둘의 경계가 자연히 높아진다.
