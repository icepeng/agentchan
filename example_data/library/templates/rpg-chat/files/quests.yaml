# === Quests — 퀘스트 진행 ===
# 메인·동료·사이드 3 트랙. quest-progress 스크립트가 갱신.

quests:
  # === 메인 — 캠페인 전체를 관통 ===
  main:
    - slug: vanishings
      title: "사라진 아이들"
      status: active             # active | complete | failed | dormant
      act: 1
      giver: via                 # NPC slug
      description: |
        부둣가 근처 고아원에서 최근 세 아이가 사라졌다. 경비대는 관심이 없다.
        누가, 왜, 어디로?
      current_step: "고아원에서 실종 정황을 듣기"
      steps_completed: []
      completion_flag: vanishings_solved

  # === 동료 — 고정 동료의 개인 퀘스트 ===
  companion:
    - slug: ghost_of_the_guild
      title: "옛 길드의 유령"     # riwu의 개인 퀘스트
      status: dormant             # Act 2 + trust:riwu>=+1 트리거로 active 전환
      owner: riwu
      act: 2
      description: "(잠겨 있음. 리우가 아직 말할 준비가 안 됐다.)"
      current_step: null
      steps_completed: []
      completion_flag: riwu_personal_quest_complete

  # === 사이드 — 세션 중 발견되는 작은 서사 ===
  # 에이전트가 세션 중 자연스럽게 생성. 예시 몇 개를 동면 상태로 미리 심어둠.
  side:
    - slug: brewers_debt
      title: "양조장 할머니의 빚"
      status: dormant
      giver: null                # 발견 시 지정
      act: 1
      description: "(아직 듣지 못한 이야기)"
      current_step: null

    - slug: coded_song
      title: "수도승의 노래"
      status: dormant
      giver: brother_selen
      act: 1
      description: "(셀렌 형제의 허밍에 무언가 있다)"
      current_step: null
