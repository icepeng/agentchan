<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Empty renderer</title>
    <link rel="stylesheet" href="/api/host/tokens.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: var(--color-void);
        color: var(--color-fg);
        font-family: var(--font-family-body);
        min-height: 100%;
      }
      .root {
        max-width: 680px;
        margin: 0 auto;
        padding: 32px 24px 96px;
      }
      .empty {
        color: var(--color-fg-4);
        font-size: 14px;
        text-align: center;
        padding: 48px 0;
      }
      .sep { margin: 32px 0; border: none; border-top: 1px solid color-mix(in srgb, var(--color-edge) 6%, transparent); }
      .path { font-size: 11px; color: var(--color-fg-4); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
      .body { white-space: pre-wrap; word-break: break-word; line-height: 1.625; font-size: 14px; }
    </style>
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <div id="root" class="root"></div>
  </body>
</html>
