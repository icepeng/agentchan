# === Spells — 주문 카탈로그 ===
# 3 학파 × 8~10 주문. 학자(scholar) 프리셋만 시작 주문 보유.
# MP 비용, 통찰 DC(시전 판정), 효과 명시. LLM이 전투·판정 시 참조.

schools:
  elemental:
    desc: "화염·냉기·번개. 공격·제압 특화."
    thematic: "자연의 폭력을 끌어다 쓴다. 시전자의 재능과 의지가 모두 필요."
  restoration:
    desc: "치유·해독·축복. 지원."
    thematic: "생명을 지키는 가장 오래된 학파. 신성 계열과 혼동하면 안 됨 — 철저히 자연 마법."
  illusion:
    desc: "환영·은신·혼돈. 유틸."
    thematic: "마음을 속이는 학파. 시전자에게 예민한 통찰 필요."

spells:
  # === 원소 (Elemental) ===
  fireball:
    school: elemental
    mp: 3
    dc: 14                        # 통찰 시전 DC
    effect: "1d8+통찰 화염 피해, 단일 대상. 건조물 발화 가능"
    target: single
    flavor: "손바닥에 응축된 열이 공기를 구부린다."

  frost_bolt:
    school: elemental
    mp: 2
    dc: 12
    effect: "1d6+통찰 냉기 피해 + 대상 다음 라운드 민첩 -1 (감속)"
    target: single
    flavor: "숨이 하얗게 얼어붙는다."

  spark_shield:
    school: elemental
    mp: 2
    dc: 13
    effect: "1라운드 방어 우위 + 근접 공격자에게 1d4 번개 반격"
    target: self
    flavor: "피부 위로 푸른 불꽃이 핀다."

  # === 회복 (Restoration) ===
  heal_light:
    school: restoration
    mp: 2
    dc: 12
    effect: "1d6+통찰 HP 회복, 동료 1명"
    target: single_ally
    flavor: "상처 위에 따뜻한 손이 닿는 감각."

  purify:
    school: restoration
    mp: 2
    dc: 14
    effect: "독·질병·공포 상태이상 1개 해제, 동료 1명"
    target: single_ally
    flavor: "검은 기운이 떠오르더니 흩어진다."

  bless:
    school: restoration
    mp: 3
    dc: 15
    effect: "동료 1명의 다음 판정 어드밴티지 (5분 지속)"
    target: single_ally
    flavor: "고요한 한숨과 함께 마음이 단단해진다."

  # === 환영 (Illusion) ===
  veil:
    school: illusion
    mp: 2
    dc: 13
    effect: "자신 은신 1라운드 (민첩 어드밴티지, 공격받으면 해제)"
    target: self
    flavor: "빛이 어깨를 지나쳐 간다."

  mirror_image:
    school: illusion
    mp: 3
    dc: 15
    effect: "2개 분신 생성. 첫 두 공격을 대신 받음"
    target: self
    flavor: "시전자가 일순간 셋이 된다."

  whisper_doubt:
    school: illusion
    mp: 2
    dc: 14
    effect: "대상 1명 다음 라운드 공격 디스어드밴티지 (화술 저항 가능, DC=14)"
    target: single_enemy
    flavor: "대상의 귓전에 제 목소리가 속삭인다."

# === scholar 프리셋 초기 구성 가이드 ===
# scholar는 시작 시 2학파 × 2주문 = 4개를 선택한다. 권장 조합:
presets:
  balanced:
    label: "균형형"
    spells: [fireball, heal_light, veil, bless]
    desc: "공격·치유·은신·강화. 상황 적응력."
  destructive:
    label: "파괴형"
    spells: [fireball, frost_bolt, spark_shield, veil]
    desc: "원소 중심. 정면 돌파 + 탈출용 은신."
  supportive:
    label: "지원형"
    spells: [heal_light, purify, bless, whisper_doubt]
    desc: "동료 유지 + 적 제압. 직접 공격 없음."
