# === Stats — NPC 관계 ===
# NPC별 trust (-5 ~ +5). sentinel 패턴 계승 — 큐 이벤트로만 변화.
# 리우는 party.yaml에서 별도 관리(동료 축). 이 파일은 비-동료 NPC만.
# relationship 스크립트가 [STAT] 마커와 함께 갱신.

npcs:
  # === 세 세력 수장 ===
  kaelen: 0                      # 포세계 암시장 두목
  lord_dasren: 0                 # 몰락 귀족
  alana: 0                       # 황동 길드장

  # === 조력자 · 정보원 ===
  marshal_teren: 0               # 시 보안관
  via: 0                         # 고아원 원장
  brother_selen: 0               # 수도승

  # === 정보 중개 / 잡역 ===
  idrian: 0                      # 음유시인 (이중 정보상)
  ilha: 0                        # 부두 상인 (길드 정보원)

# 신뢰 의미 레전드 (렌더러 툴팁 참조용):
# -5 : 적의 (파괴적 관계)
# -3 : 경계 (비협조)
# -1 ~ +1 : 중립
# +3 : 협력 (정보 공유)
# +5 : 동맹 (약점·진실 공유)
