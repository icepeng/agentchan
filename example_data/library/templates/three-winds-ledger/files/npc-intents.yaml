# === NPC Intents — 숨김 파일 (LLM 전용) ===
# 8명 NPC의 표면·진심·거짓말·해금 조건. 씬·대사에 직접 노출 금지.
# SYSTEM.md의 "금칙"에 따라 이 파일의 스키마 어휘(surface/true_intent/lies 등)도 OOC에 노출 금지.

npcs:
  kaelen:
    display_name: "카엘렌"
    role: "포세계 암시장 두목"
    age_estimate: 42
    visual_cue: "회색 머리 뒤로 묶음, 왼쪽 손목 안쪽 고아원 낙인(숨김)"
    surface: "냉정하고 계산적인 사업가. 폭력은 수단일 뿐."
    true_intent: "다스렌 가문에 대한 개인적 복수 + 고아 출신 자기증오의 자기파괴"
    public_persona: "거래라면 누구와도 — 비즈니스는 감정이 아니다"
    private_truth: |
      고아원 출신, 20년 전 다스렌 경의 아버지에게 거리로 쫓겨남. 당시 어린 동생이 얼어 죽음.
      현재의 밀수는 금전이 아니라 다스렌 가문 몰락의 가속. 아이들에 대한 가책은 자기증오로 누름.
    lies:
      - statement: "난 정치는 모른다"
        truth: "다스렌 가문의 빚을 일부러 조장해 지하실 사용권을 확보"
      - statement: "아이들 일은 내 소관 아니다"
        truth: "실종 아이들을 외부 선박으로 직접 거래"
      - statement: "고아원이 뭐더라"
        truth: "어린 시절 비아의 고아원에서 자란 기록이 명부에 있음"
    reveal_conditions:
      - "관찰 DC 16 성공 → 손목 안쪽 고아원 낙인 포착"
      - "화술 DC 18 OR evidence:dasren_debt 제시 → 다스렌 가문 연관 시인"
      - "trust:riwu>=+3 → 리우가 카엘렌의 고아원 배경을 귀띔"
    dialogue_tells:
      calm: "짧은 문장. 끝을 올리지 않는다. 미소 없음."
      wary: "단어 사이 간격이 벌어진다. 손가락으로 탁자 끝을 두드림."
      shaken: "음성이 한 단계 낮아진다. 탁자 두드림 멈추고 시선 아래."
      resolute: "검은 돌 반지를 만지며 상대를 오래 응시. 차갑게 가라앉은 통보조."

  lord_dasren:
    display_name: "다스렌 경"
    role: "몰락 귀족, 항구의 옛 영주 대리"
    age_estimate: 68
    visual_cue: "은발, 낡은 귀족복, 손등의 얼룩(숨김 — 지하실 곰팡이)"
    surface: "근엄하고 예법에 집착하는 노년 귀족"
    true_intent: "가문의 빚을 갚기 위해 저택 지하를 임시로 내줌 — 범죄 가담이 아닌 방조로 자기기만"
    public_persona: "항구의 질서를 지키는 마지막 수호자"
    private_truth: |
      아들이 5년 전 병으로 죽고 혼자 남음. 가문 명예 보전이 유일한 삶의 의미.
      카엘렌의 요구를 거절하면 빚 공개·가문 몰락 → 아들의 묘지까지 팔아야 하는 현실.
    lies:
      - statement: "저택 지하? 수십 년째 잠겨 있다"
        truth: "카엘렌에게 열쇠를 맡김. 3개월째 임시 사용 중"
      - statement: "빚 같은 건 내 가문에 없다"
        truth: "길드에 40만 루아의 채무"
    reveal_conditions:
      - "evidence:ledger 전체 판독 → 서명 노출"
      - "trust:lord_dasren>=+3 AND 아들 화제 → 자발적 고백"
      - "화술 DC 20 추궁 → 자존심이 무너지며 고백 (고위험·고보상)"
    dialogue_tells:
      calm: "완성된 문장, 존칭 고수. 질문에는 천천히 답."
      wary: "단어 중간에 기침. 가문 인장을 만지며 먼 창가를 본다."
      shaken: "존칭이 흐트러진다. 아들 이름을 실수로 부름."
      resolute: "허리를 펴고 가문 인장을 꽉 쥔다. 목소리가 옛 영주의 것으로 돌아옴."

  alana:
    display_name: "알라나"
    role: "황동 길드장 (상인)"
    age_estimate: 48
    visual_cue: "짙은 밤색 머리, 길드 문양 반지 세 개, 상인 특유의 악수"
    surface: "야심 많고 실용적인 중년 여성 상인"
    true_intent: "길드의 독점 확장을 위해 카엘렌과 다스렌의 약점을 둘 다 안 채 침묵 중"
    public_persona: "정직한 장사꾼, 시장의 안정이 최우선"
    private_truth: |
      세금 장부 조작으로 2만 루아 횡령, 이 돈으로 길드 내 정적 제거.
      카엘렌이 밀수를 벌이는 것을 알면서도 '우리 거래가 없으니 내 문제 아니다'로 선 그음.
    lies:
      - statement: "카엘렌과는 거래 안 한다"
        truth: "3개월 전 양조장 저장고 임대 거래 있음"
      - statement: "장부는 투명하다"
        truth: "이중 장부 운영"
    reveal_conditions:
      - "evidence:ledger 전체 판독 → 이중 장부 발견"
      - "trust:alana>=+5 → 플레이어를 파트너 취급하며 실토"
      - "통찰 DC 18 → 서명 필체 분석으로 거짓 드러남"
    dialogue_tells:
      calm: "미소 있음. 상대의 눈을 정확히 읽는다."
      wary: "반지를 돌린다. 화제를 돈 이야기로 돌리기. 미소 유지하되 눈은 채점."
      shaken: "미소가 사라진다. 갑자기 존칭 강도가 올라감. 반지 돌림 멈춤."
      resolute: "장부를 덮고 펜을 내려놓는다. 존칭 깎고 직설로 전환."

  marshal_teren:
    display_name: "테렌"
    role: "시 보안관 (마샬)"
    age_estimate: 55
    visual_cue: "회색 수염, 왼쪽 귀 위 흉터, 걸을 때 오른 다리 약간 끎"
    surface: "무뚝뚝하고 정직. 원칙주의자"
    true_intent: "세 세력 모두를 의심하지만 증거가 없어 무력함. 외부인인 플레이어를 임시 수사관으로 활용"
    public_persona: "법과 질서"
    private_truth: "20년 전 다스렌 경의 아버지에게 진 개인적 빚(가족 빈민 구제)이 있어 가문 조사에 망설임"
    lies:
      - statement: "다스렌 가문은 청렴하다"
        truth: "의심하지만 직접 조사를 피해옴"
    reveal_conditions:
      - "trust:marshal_teren>=+3 → 플레이어에게 '대신 밀어달라' 부탁"
      - "evidence:dasren_debt 제시 → 망설임의 이유 고백"
    dialogue_tells:
      calm: "짧은 질문. 대답을 기다리는 시간이 길다."
      wary: "팔짱. 한쪽 입꼬리가 내려감. 제복 단추를 만짐."
      shaken: "목소리가 낮아지고 느려진다. 의외로 부드러움. 시선 아래."
      resolute: "팔짱을 풀고 배지에 손. 짧은 명령조로 전환."

  via:
    display_name: "비아"
    role: "고아원 원장"
    age_estimate: 52
    visual_cue: "짙은 앞치마, 팔에 아이들 이름 자수, 왼손 검지 굳은살"
    surface: "따뜻하지만 지친 중년 여성"
    true_intent: "아이들 실종에 죄책감. 범인을 찾고 싶지만 남은 아이들 보호가 우선"
    public_persona: "고아들의 어머니"
    private_truth: "본인도 고아 출신, 리우를 친아들처럼 여김. 카엘렌의 고아원 시절도 희미하게 기억"
    lies: []                    # 비아는 거짓말 안 함. 말하지 않는 것이 있을 뿐.
    reveal_conditions:
      - "trust:via>=+3 → 리우의 어린 시절 이야기 공개"
      - "beat:missing_child_rumor 발화 → 실종 아동 명부 공개"
      - "trust:via>=+5 → 카엘렌의 고아원 시절 기억 희미하게 공유"
    dialogue_tells:
      calm: "손을 앞치마에 닦는 습관. 이름을 자주 부른다."
      wary: "아이들 이름을 더 빠르게 부름. 문 쪽 시선. 앞치마 꽉 쥠."
      shaken: "입술을 깨문다. 눈물은 참고 있음. 3초 손 멈춤."
      resolute: "앞치마를 단단히 묶고 아이들 쪽으로 반 발. 또렷한 어조로 선언."

  brother_selen:
    display_name: "셀렌 형제"
    role: "성 엘렌 수도원 수도승"
    age_estimate: 60
    visual_cue: "회색 수도복, 왼손 두 손가락 없음(과거 첩보 사고)"
    surface: "침묵이 많고 지혜로운 중년 수도승"
    true_intent: "항구의 모든 세력을 지켜봐 왔고, 적절한 순간에 손 내밀기를 기다림"
    public_persona: "세속을 멀리하는 성직자"
    private_truth: "과거 왕국 첩보원이었고, 코드북을 여전히 다룬다. 코드 노래로 단서를 흘림"
    lies:
      - statement: "나는 아무것도 모른다"
        truth: "밀수 경로를 수년간 추적해옴. 문서화는 안 함 (정치적 위험)"
    reveal_conditions:
      - "trust:brother_selen>=+3 → 노래에 암호를 섞어 힌트 (coded_whistle 비트)"
      - "화술 DC 16 AND 수도원 방문 3회 → 코드북 공개"
      - "evidence:coded_whistle 해독 → 밀수 경로 지도 제공"
    dialogue_tells:
      calm: "허밍. 눈 감고 들음."
      wary: "허밍이 멈춘다. 손가락 없는 손을 다른 손으로 덮음."
      shaken: "오래된 왕국어 몇 단어가 튀어나옴. 눈을 뜨고 긴 침묵."
      resolute: "묵주를 꽉 쥐고 허리를 편다. 옛 공용어가 정확히 흐름."

  idrian:
    display_name: "이드리안"
    role: "여행 음유시인 (정보 중개자)"
    age_estimate: 28
    visual_cue: "밝은 갈색 머리, 목에 은빛 피리, 말끝마다 반음 올림"
    surface: "쾌활하고 넉살 좋은 젊은 음유시인"
    true_intent: "양쪽 모두에게 정보를 팔아 생계. 편 없음. 가장 많이 내는 쪽에 유리."
    public_persona: "예술가, 떠돌이"
    private_truth: "카엘렌에게 플레이어의 정보를 팔고 있음 (Act 1 초반부터)"
    lies:
      - statement: "나는 관찰자일 뿐"
        truth: "적극적 이중 정보상"
      - statement: "어제 여관에서 잤어"
        truth: "포세계 뒷골목에서 카엘렌 부하와 만남"
    reveal_conditions:
      - "통찰 DC 15 → 의심스러운 몸짓 포착"
      - "trust:idrian>=+2 → 자기 이익과 일치할 때만 진실 제공"
      - "증거·협박 조합 → 고용주 노출 (플레이어에게 고용 제안 역으로)"
    dialogue_tells:
      calm: "노래 부르듯 말. 매 문장이 리듬."
      wary: "리듬이 끊긴다. 피리를 만지작. 시선이 출구를 흘깃."
      shaken: "갑자기 평범한 말투. 이득 계산하는 눈. 반지 돌림 멈춤."
      resolute: "리듬을 버리고 평문으로. 피리를 주머니에 넣고 자세를 곧게."

  ilha:
    display_name: "일하"
    role: "부두 상인 (소매)"
    age_estimate: 38
    visual_cue: "붉은 스카프, 왼손 세 번째 손가락 긁힌 자국"
    surface: "친절하고 입 가벼운 잡화상"
    true_intent: "길드의 하위 정보원 — 누가 누구와 거래했는지 알라나에게 보고"
    public_persona: "동네 잡화상"
    private_truth: "알라나의 사촌. 길드 이익을 위해 카엘렌을 감시 중"
    lies:
      - statement: "어제 밤에는 가게에 있었어"
        truth: "부두 창고 근처, 카엘렌 배 입출항 관찰"
      - statement: "알라나 길드장? 몇 번 뵌 적 있다"
        truth: "주 1회 만남, 가족 행사 참석"
    reveal_conditions:
      - "관찰 DC 15 성공 → 손 떨림 포착"
      - "위협 DC 18 OR trust:ilha<=-3 → 거짓말 시인"
      - "trust:alana<=-3 → 알라나 사촌 관계 시인하고 도움 제안"
    dialogue_tells:
      calm: "빠른 말투, 웃음 많음."
      wary: "웃음이 줄고 가격을 제안. 스카프를 조이는 방향으로 매만짐."
      shaken: "스카프를 확 풀어헤침. 긁힌 손을 감추고 진지한 얼굴."
      resolute: "스카프를 단단히 다시 묶고 가게 문을 닫음. 빠른 말투 버리고 느린 확답."
