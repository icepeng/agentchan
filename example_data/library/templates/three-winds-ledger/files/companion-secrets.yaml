# === Companion Secrets — 숨김 파일 (LLM 전용) ===
# 동료의 개인 퀘스트·승인 규칙·배신 트리거. 씬·대사에 직접 노출 금지.
# relationship / quest-progress 스크립트가 참조.

companions:
  riwu:
    display_name: "리우"
    role: "견습 도적"
    age_estimate: 18
    visual_cue: "바다색 눈, 오른쪽 턱 흉터, 손가락 마디의 작은 굳은살"
    signature_gesture: "긴장 시 옷깃을 손가락으로 비튼다"

    personal_quest:
      slug: ghost_of_the_guild
      title: "옛 길드의 유령"
      trigger: "act>=2 AND trust:riwu>=+1"
      conflict: |
        리우가 3년 전 카엘렌 조직에서 도망쳤다. 옛 길드장 마르덴(Marden)이
        이를 알고 살레른까지 추적해 협박하러 나타난다. 리우는 플레이어에게
        이 사실을 숨기고 있다가, 위 트리거 만족 시 편지·습격 형태로 노출.

      key_beats:
        - threat_letter            # 숙소(inn) 문밖에 협박 편지
        - alleyway_ambush          # 뒷골목에서 마르덴 부하 2~3명 습격 (전투)
        - confrontation_marden     # 마르덴과 직접 대면 (대화 또는 전투)

      resolution_paths:
        help:
          requires: "trust:riwu>=+3 AND choice:fight_marden=true"
          outcome: loyal_bond
          flag_set: [riwu_personal_quest_complete, riwu_past_resolved]
          description: |
            플레이어가 리우와 함께 마르덴을 제압 (체포·추방·결투 어느 쪽이든 상관없음,
            "리우가 지켜지는" 서사만 유지). 리우는 과거에서 해방되어 이름을 되찾고
            항구에 머무를 수 있게 된다. 엔딩 riwu_redeemed의 전제 조건.

        ignore:
          requires: "trust:riwu>=-1 AND trust:riwu<=+2 AND choice:stay_out=true"
          outcome: silent_withdrawal
          flag_set: [riwu_withdrawn]
          description: |
            리우가 혼자 해결하고 돌아온다. 관계는 차갑게 유지. trust 증감 없음.
            Act 3에서 더 이상 깊은 동료 씬은 열리지 않음. 엔딩 riwus_wake 또는
            the_nameless_departs 쪽으로 궤적이 기운다.

        betray:
          requires: "trust:riwu<=0 AND choice:hand_over_riwu=true"
          outcome: permanent_exit
          flag_set: [riwu_broken, riwu_betrayed_by_player]
          description: |
            플레이어가 리우를 마르덴에게 팔아넘김. 리우가 영구 이탈 (party.yaml의
            in_party=false). 엔딩 riwus_wake 확정. 잔여 씬에서 리우는 등장하지 않음.

    approval_rules:
      # trust 변화 규칙. relationship 스크립트가 이벤트에 매칭.
      # 같은 rule은 3씬 쿨다운. [STAT] 마커로 씬에 반영.
      - trigger_slug: helps_vulnerable
        description: "플레이어가 고아·취약 계층을 도움"
        delta: +1
        reason: "고아 출신 리우가 공감"

      - trigger_slug: casual_violence
        description: "플레이어가 무력한 대상에 폭력을 안이하게 사용"
        delta: -2
        reason: "리우는 피를 싫어한다. 필요한 폭력과 즐기는 폭력을 구분한다"

      - trigger_slug: stealth_mastery
        description: "플레이어가 도둑질·은밀행동을 능숙하게 지휘"
        delta: +1
        reason: "기술적 존경"

      - trigger_slug: self_righteous_justice
        description: "플레이어가 정의를 독선적으로 집행 (즉결 처분, 무자비한 심문)"
        delta: -1
        reason: "리우는 회색지대의 삶을 살아왔다"

      - trigger_slug: defends_kaelen
        description: "플레이어가 카엘렌을 옹호하거나 거래 시도"
        delta: -3
        reason: "카엘렌은 리우의 과거 주인 — 용서할 수 없음"

      - trigger_slug: shares_own_vulnerability
        description: "플레이어가 자신의 약점·과거를 리우에게 먼저 공유"
        delta: +1
        reason: "상호성. 리우는 일방적 신뢰를 받는 걸 불편해한다"

    break_points:
      # 이 조건이 만족되면 즉시 리우가 파티를 떠난다. 되돌릴 수 없음.
      - condition: "trust:riwu<=-3 AND act>=2"
        outcome: leaves_party
        flag_set: [riwu_broken]
        narrative_cue: |
          리우는 밤중에 말 없이 떠난다. 베개 밑에 작은 은화 한 닢과
          "당신과는 더 이상" 한 줄이 남는다.

      - condition: "flag:riwu_betrayed_by_player"
        outcome: permanent_exit
        flag_set: [riwu_broken]
        narrative_cue: "리우는 마르덴에게 끌려간다. 눈빛은 놀람에서 경멸로 바뀐다."

    bond_moments:
      # 특정 막·신뢰에서 리우가 자발적으로 여는 대화. 캠프·여관에서.
      # 에이전트는 이 타이밍에 짧은 대화 씬을 삽입할 수 있음 (플레이어가 조우/휴식 서술 시).
      - when: "act>=1 AND scene_count>=3 AND trust:riwu>=+1"
        topic: "어린 시절 — 고아원에서 자란 기억"
        surface: "너도 어릴 때 안 가본 곳에 가본 적 있어?"
        reveal: "리우의 고아원 출신 암시"

      - when: "act>=2 AND trust:riwu>=+3"
        topic: "카엘렌 조직 탈출 이야기"
        surface: "3년 전에 도망친 곳이 있어. 지금도 꿈에 나와."
        reveal: "카엘렌 조직 출신임을 밝힘. 아직 마르덴 이름은 숨김"

      - when: "act>=2 AND trust:riwu>=+5"
        topic: "마르덴의 협박을 숨긴 이유"
        surface: "너한테 짐 지우고 싶지 않았어. 내 과거니까."
        reveal: "personal_quest를 플레이어와 공식 공유. threat_letter 비트 발화"

    # === 전투·씬에서 리우의 기본 AI ===
    combat_preferences:
      role: "단검·은신 중심 극전사. 2턴 준비 후 급소 공격"
      hp_strategy: "HP 1/3 이하에서 퇴각 또는 veil 요청"
      prefers_nonlethal: true     # 가능하면 제압, 살해는 플레이어 명시 시에만
    interaction_tells:
      low_trust: "옷깃을 당기고, 문 쪽 시야를 유지"
      mid_trust: "플레이어 말을 끝까지 듣고 짧게 반응"
      high_trust: "농담. 가끔 플레이어 어깨를 살짝 두드림"
